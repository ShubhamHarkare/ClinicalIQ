version: '3.8'

services:
  db:
    image: postgres:15
    container_name: clinical_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: clinical_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DB_HOST=db  # This tells Python to look for the 'db' service name, not 'localhost'
    depends_on:
      - db

volumes:
  postgres_data: